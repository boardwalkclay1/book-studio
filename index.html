<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Boardwalk Book Studio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <!-- Logo (top-left, clickable) -->
  <img src="img/publish-logo.JPG" id="brandLogo"
       onclick="window.open('https://yourwebsite.com', '_blank')">

  <div id="app">

    <!-- LEFT: BOOK FORMAT -->
    <section class="panel panel-left">

      <div class="panel-header">
        <h2 class="panel-title">Book Format</h2>
      </div>

      <!-- Book identity -->
      <div class="subpanel">
        <h3 class="sub-title">Book Identity</h3>

        <label class="field-label">Book title</label>
        <input id="bookTitle" class="field-input" placeholder="Enter book title">

        <label class="field-label">Subtitle</label>
        <input id="bookSubtitle" class="field-input" placeholder="Optional subtitle">

        <label class="field-label">Author name</label>
        <input id="bookAuthor" class="field-input" placeholder="Your name or pen name">
      </div>

      <!-- Structure -->
      <div class="subpanel">
        <h3 class="sub-title">Structure</h3>

        <label class="field-label">Front matter</label>
        <div class="toggle-row">
          <label><input type="checkbox" id="hasDedication" checked> Dedication</label>
          <label><input type="checkbox" id="hasAcknowledgments" checked> Acknowledgments</label>
          <label><input type="checkbox" id="hasCopyright" checked> Copyright page</label>
        </div>

        <label class="field-label">Back matter</label>
        <div class="toggle-row">
          <label><input type="checkbox" id="hasAboutAuthor" checked> About the author</label>
          <label><input type="checkbox" id="hasExtras"> Extras / Notes</label>
        </div>
      </div>

      <!-- Layout -->
      <div class="subpanel">
        <h3 class="sub-title">Page Layout</h3>

        <label class="field-label">Trim size</label>
        <select id="trimSize" class="field-input">
          <option value="5x8">5 x 8 in</option>
          <option value="5.5x8.5">5.5 x 8.5 in</option>
          <option value="6x9" selected>6 x 9 in</option>
          <option value="8.5x11">8.5 x 11 in</option>
        </select>

        <label class="field-label">Margins</label>
        <select id="marginPreset" class="field-input">
          <option value="standard" selected>Standard</option>
          <option value="wide">Wide (literary)</option>
          <option value="compact">Compact</option>
        </select>
      </div>

      <!-- Chapters / Index -->
      <div class="subpanel">
        <div class="subpanel-header">
          <h3 class="sub-title">Chapters / Index</h3>
          <button id="addChapterBtn" class="btn btn-gold">+ Add</button>
        </div>
        <div id="chaptersList" class="chapters-list"></div>
      </div>

    </section>

    <!-- RIGHT: EDITOR -->
    <section class="panel panel-right">

      <div class="panel-header">
        <input id="chapterTitle" class="chapter-title-input" placeholder="Chapter title">
      </div>

      <!-- Toolbar -->
      <div id="editorToolbar" class="toolbar"></div>

      <div class="toolbar-row">
        <label>Font size</label>
        <select id="fontSizeSelect">
          <option value="2">Small</option>
          <option value="3" selected>Normal</option>
          <option value="5">Large</option>
          <option value="7">Huge</option>
        </select>

        <label>Line spacing</label>
        <select id="lineSpaceSelect">
          <option value="1.2">1.2</option>
          <option value="1.5" selected>1.5</option>
          <option value="1.8">1.8</option>
          <option value="2.0">2.0</option>
        </select>

        <label>Letter spacing</label>
        <input type="range" id="letterSpaceSelect" min="0" max="10" value="0">

        <button id="insertSceneBreak" class="btn btn-gold">Scene Break</button>
      </div>

      <div id="editorContent" class="editor" contenteditable="true">
        Start writing your story...
      </div>

      <div class="stats-panel">
        <div id="wordStats"></div>
        <div id="saveIndicator">Saving…</div>
      </div>

      <div id="nextStepGuide" class="next-step-guide"></div>

    </section>

  </div>

  <script src="js/index.js" type="module"></script>
</body>
</html>
