<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Boardwalk Book Studio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <!-- Logo -->
  <img src="img/publish-logo.JPG" id="brandLogo"
       onclick="window.open('https://yourwebsite.com', '_blank')">

  <div id="app">

    <!-- LEFT SIDEBAR (EMPTY — JS WILL FILL IT WITH MODULES) -->
    <section class="panel panel-left" id="leftSidebar"></section>

    <!-- RIGHT: EDITOR -->
    <section class="panel panel-right">

      <div class="panel-header">
        <input id="chapterTitle" class="chapter-title-input" placeholder="Page title">
      </div>

      <!-- Toolbar -->
      <div id="editorToolbar" class="toolbar"></div>

      <div class="toolbar-row">
        <label>Font size</label>
        <select id="fontSizeSelect">
          <option value="2">Small</option>
          <option value="3" selected>Normal</option>
          <option value="5">Large</option>
          <option value="7">Huge</option>
        </select>

        <label>Line spacing</label>
        <select id="lineSpaceSelect">
          <option value="1.2">1.2</option>
          <option value="1.5" selected>1.5</option>
          <option value="1.8">1.8</option>
          <option value="2.0">2.0</option>
        </select>

        <label>Letter spacing</label>
        <input type="range" id="letterSpaceSelect" min="0" max="10" value="0">

        <button id="insertSceneBreak" class="btn btn-gold">Scene Break</button>
      </div>

      <div id="editorContent" class="editor" contenteditable="true">
        Start writing your story...
      </div>

      <div class="stats-panel">
        <div id="wordStats"></div>
        <div id="saveIndicator">Saving…</div>
      </div>

      <div id="nextStepGuide" class="next-step-guide"></div>

    </section>

  </div>

  <script src="js/index.js" type="module"></script>
</body>
</html>
