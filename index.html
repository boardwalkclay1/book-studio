<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Boardwalk Book Studio — Library</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <!-- CSS -->
  <link rel="stylesheet" href="css/index.css" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">

  <!-- Favicon + Social -->
  <link rel="icon" type="image/jpeg" href="img/publish-logo.jpg" />
  <meta property="og:title" content="Boardwalk Book Studio" />
  <meta property="og:description" content="Create. Write. Publish. Your entire book journey starts here." />
  <meta property="og:image" content="img/publish-logo.jpg" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="img/publish-logo.jpg" />
</head>

<body>

  <!-- GOLD DUST -->
  <div class="gold-dust"></div>

  <!-- FEATHERS -->
  <div class="feathers" aria-hidden="true">
    <svg class="feather f1" viewBox="0 0 64 64"><path d="M6 58c16-16 36-36 52-52" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
    <svg class="feather f2" viewBox="0 0 64 64"><path d="M58 6C42 22 22 42 6 58" fill="none" stroke="currentColor" stroke-width="1.4"/></svg>
    <svg class="feather f3" viewBox="0 0 64 64"><path d="M10 10c12 12 24 24 44 44" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
  </div>

  <!-- BRAND BUTTON (links to publishing website) -->
  <a href="https://boardwalkpublishing.com" id="brandBtn" class="brand-btn" aria-label="Boardwalk Publishing Home">
    <img src="img/publish-logo.jpg" alt="Boardwalk Publishing Logo" class="brand-logo-img">
  </a>

  <main id="libraryApp" class="library-app">

    <!-- HERO -->
    <header class="library-hero">
      <h1 class="library-title">Boardwalk Book Studio</h1>
      <p class="library-tagline">Create. Write. Publish. Your entire book journey starts here.</p>
    </header>

    <!-- HEADER BAR -->
    <div class="library-header">
      <h2 class="library-subtitle">Your Books</h2>
      <div class="header-actions">
        <button id="newBookBtn" class="btn btn-gold new-book-btn">+ Create New Book</button>
      </div>
    </div>

    <!-- BOOK GRID -->
    <section class="library-panel">
      <div id="bookGrid" class="book-grid" role="list"></div>
    </section>

  </main>

  <!-- NEW BOOK MODAL -->
  <div id="newBookModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-content">
      <h2 class="modal-title">Create New Book</h2>

      <label class="field-label">Book Title</label>
      <input id="newBookTitle" class="field-input" placeholder="Enter book title" />

      <label class="field-label">Subtitle</label>
      <input id="newBookSubtitle" class="field-input" placeholder="Optional subtitle" />

      <label class="field-label">Author Name</label>
      <input id="newBookAuthor" class="field-input" placeholder="Your name or pen name" />

      <label class="field-label">Genre</label>
      <input id="newBookGenre" class="field-input" placeholder="Fantasy, Thriller, Romance..." />

      <label class="field-label">Audience</label>
      <input id="newBookAudience" class="field-input" placeholder="Adults, YA, Middle Grade..." />

      <label class="field-label">Short Description</label>
      <textarea id="newBookDescription" class="field-input" placeholder="What is this book about?"></textarea>

      <label class="field-label">Cover Image</label>
      <input type="file" id="newBookCover" accept="image/*" class="field-input" />

      <div class="modal-actions">
        <button id="createBookConfirm" class="btn btn-gold modal-btn">Save</button>
        <button id="closeModal" class="btn modal-btn">Cancel</button>
      </div>
    </div>
  </div>

  <script src="js/index.js"></script>
</body>
</html>
