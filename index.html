<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Boardwalk Book Studio — Library</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/index.css" />
</head>
<body>

  <!-- FULLSCREEN BACKGROUND (gold gradient) -->
  <div class="library-bg" aria-hidden="true"></div>

  <!-- Top-left brand (small clickable logo) -->
  <button id="brandBtn" class="brand-btn" aria-label="Boardwalk Home"></button>

  <main id="libraryApp" class="library-app" role="main">

    <!-- HERO -->
    <header class="library-hero" role="banner">
      <h1 class="library-title">Boardwalk Book Studio</h1>
      <p class="library-tagline">Create. Write. Publish. Your entire book journey starts here.</p>
    </header>

    <!-- HEADER BAR -->
    <div class="library-header">
      <h2 class="library-subtitle">Your Books</h2>
      <div class="header-actions">
        <button id="newBookBtn" class="btn btn-gold new-book-btn">+ Create New Book</button>
      </div>
    </div>

    <!-- BOOK GRID PANEL -->
    <section class="library-panel" aria-labelledby="library-heading">
      <div id="bookGrid" class="book-grid" role="list" aria-live="polite"></div>
    </section>

  </main>

  <!-- NEW BOOK MODAL -->
  <div id="newBookModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-content">
      <h2 id="modalTitle" class="modal-title">Create New Book</h2>

      <label class="field-label">Book Title</label>
      <input id="newBookTitle" class="field-input" placeholder="Enter book title" />

      <label class="field-label">Subtitle</label>
      <input id="newBookSubtitle" class="field-input" placeholder="Optional subtitle" />

      <label class="field-label">Author Name</label>
      <input id="newBookAuthor" class="field-input" placeholder="Your name or pen name" />

      <label class="field-label">Genre</label>
      <input id="newBookGenre" class="field-input" placeholder="Fantasy, Thriller, Romance..." />

      <label class="field-label">Audience</label>
      <input id="newBookAudience" class="field-input" placeholder="Adults, YA, Middle Grade..." />

      <label class="field-label">Short Description</label>
      <textarea id="newBookDescription" class="field-input" placeholder="What is this book about?"></textarea>

      <label class="field-label">Cover Image</label>
      <input type="file" id="newBookCover" accept="image/*" class="field-input" />

      <div class="modal-actions">
        <button id="createBookConfirm" class="btn btn-gold modal-btn">Save</button>
        <button id="closeModal" class="btn modal-btn">Cancel</button>
      </div>
    </div>
  </div>

  <script src="js/index.js" type="module"></script>
</body>
</html>
