<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Boardwalk Book Studio — Library</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <!-- Only index.css is loaded -->
  <link rel="stylesheet" href="css/index.css" />

  <!-- Fonts used by the page -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">

  <!-- Favicon and social preview image -->
  <link rel="icon" type="image/jpeg" href="img/publish-logo.jpg" />
  <meta property="og:title" content="Boardwalk Book Studio" />
  <meta property="og:description" content="Create. Write. Publish. Your entire book journey starts here." />
  <meta property="og:image" content="img/publish-logo.jpg" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="img/publish-logo.jpg" />
</head>
<body>

  <!-- Decorative feathers (SVGs) -->
  <div class="feathers" aria-hidden="true">
    <svg class="feather f1" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M6 58c16-16 36-36 52-52" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <svg class="feather f2" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M58 6C42 22 22 42 6 58" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <svg class="feather f3" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M10 10c12 12 24 24 44 44" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <!-- Top-left brand (small clickable logo) -->
  <button id="brandBtn" class="brand-btn" aria-label="Boardwalk Home" title="Boardwalk Home" style="color:var(--gold);"></button>

  <main id="libraryApp" class="library-app" role="main">

    <!-- HERO -->
    <header class="library-hero" role="banner">
      <h1 class="library-title">Boardwalk Book Studio</h1>
      <p class="library-tagline">Create. Write. Publish. Your entire book journey starts here.</p>
    </header>

    <!-- HEADER BAR -->
    <div class="library-header">
      <h2 class="library-subtitle">Your Books</h2>
      <div class="header-actions">
        <button id="newBookBtn" class="btn btn-gold new-book-btn" style="color:var(--gold);">+ Create New Book</button>
      </div>
    </div>

    <!-- BOOK GRID PANEL -->
    <section class="library-panel" aria-labelledby="library-heading">
      <div id="bookGrid" class="book-grid" role="list" aria-live="polite"></div>
    </section>

  </main>

  <!-- NEW BOOK MODAL -->
  <div id="newBookModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-content">
      <h2 id="modalTitle" class="modal-title">Create New Book</h2>

      <label class="field-label" for="newBookTitle">Book Title</label>
      <input id="newBookTitle" class="field-input" placeholder="Enter book title" />

      <label class="field-label" for="newBookSubtitle">Subtitle</label>
      <input id="newBookSubtitle" class="field-input" placeholder="Optional subtitle" />

      <label class="field-label" for="newBookAuthor">Author Name</label>
      <input id="newBookAuthor" class="field-input" placeholder="Your name or pen name" />

      <label class="field-label" for="newBookGenre">Genre</label>
      <input id="newBookGenre" class="field-input" placeholder="Fantasy, Thriller, Romance..." />

      <label class="field-label" for="newBookAudience">Audience</label>
      <input id="newBookAudience" class="field-input" placeholder="Adults, YA, Middle Grade..." />

      <label class="field-label" for="newBookDescription">Short Description</label>
      <textarea id="newBookDescription" class="field-input" placeholder="What is this book about?"></textarea>

      <label class="field-label" for="newBookCover">Cover Image</label>
      <input type="file" id="newBookCover" accept="image/*" class="field-input" />

      <div class="modal-actions">
        <button id="createBookConfirm" class="btn btn-gold modal-btn" style="color:var(--gold);">Save</button>
        <button id="closeModal" class="btn modal-btn" style="color:var(--gold);">Cancel</button>
      </div>
    </div>
  </div>

  <script src="js/index.js" type="module"></script>
</body>
</html>
