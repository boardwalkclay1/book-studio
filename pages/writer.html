<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Boardwalk Book Studio — Writer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Favicon -->
  <link rel="icon" type="image/jpeg" href="../img/publish-logo.jpg" />

  <!-- Social preview -->
  <meta property="og:title" content="Boardwalk Book Studio — Writer" />
  <meta property="og:description" content="Write, structure, and publish your book with cinematic tools." />
  <meta property="og:image" content="../img/publish-logo.jpg" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="../img/publish-logo.jpg" />

  <link rel="stylesheet" href="../css/main.css" />
</head>
<body>

  <!-- Background -->
  <img src="../img/bp-back.jpg" class="bg-img" aria-hidden="true" />

  <div id="app" class="writer-layout">

    <!-- LEFT SIDEBAR -->
    <aside id="leftSidebar" class="panel panel-left">

      <h2 class="sidebar-title">Book Structure</h2>

      <!-- FRONT MATTER -->
      <div class="sidebar-section">
        <div class="sidebar-header">
          <span>Front Matter</span>
          <button class="sidebar-add-btn tree-add-front">+</button>
        </div>
        <ul class="sidebar-list" id="frontMatterList"></ul>
      </div>

      <!-- PARTS & CHAPTERS -->
      <div class="sidebar-section">
        <div class="sidebar-header">
          <span>Parts & Chapters</span>
          <button class="sidebar-add-btn tree-add-part">+</button>
        </div>
        <div id="partsContainer"></div>
      </div>

      <!-- BACK MATTER -->
      <div class="sidebar-section">
        <div class="sidebar-header">
          <span>Back Matter</span>
          <button class="sidebar-add-btn tree-add-back">+</button>
        </div>
        <ul class="sidebar-list" id="backMatterList"></ul>
      </div>

    </aside>

    <!-- CENTER EDITOR -->
    <main class="panel panel-center">

      <div class="panel-header">
        <input id="chapterTitle" class="chapter-title-input" placeholder="Page title" />
        <input id="chapterSubtitle" class="chapter-subtitle-input" placeholder="Subtitle (optional)" />
      </div>

      <!-- TOOLBAR -->
      <div id="editorToolbar" class="toolbar">
        <button data-cmd="bold" class="tool-btn"><strong>B</strong></button>
        <button data-cmd="italic" class="tool-btn"><em>I</em></button>
        <button data-cmd="underline" class="tool-btn"><u>U</u></button>

        <label>Font</label>
        <select id="fontFamilySelect" class="tool-select">
          <option value="Inter, system-ui">Inter</option>
          <option value="Georgia, serif">Georgia</option>
          <option value="Times New Roman, serif">Times New Roman</option>
          <option value="Arial, sans-serif">Arial</option>
        </select>

        <label>Size</label>
        <select id="fontSizeSelect" class="tool-select">
          <option value="14">14px</option>
          <option value="16" selected>16px</option>
          <option value="18">18px</option>
          <option value="20">20px</option>
        </select>

        <label>Line</label>
        <select id="lineSpaceSelect" class="tool-select">
          <option value="1.2">1.2</option>
          <option value="1.5" selected>1.5</option>
          <option value="1.8">1.8</option>
          <option value="2.0">2.0</option>
        </select>

        <label>Letter</label>
        <input type="range" id="letterSpaceSelect" min="0" max="6" value="0" class="tool-range">

        <button id="insertSceneBreak" class="btn btn-gold">Scene Break</button>
        <button id="focusModeBtn" class="btn btn-gold">Focus Mode</button>
      </div>

      <!-- EDITOR -->
      <div id="editorContent" class="editor" contenteditable="true">
        Start writing your story...
      </div>

      <!-- STATS -->
      <div class="stats-panel">
        <div id="wordStats">Words: 0 • Chapters: 0</div>
        <div id="saveIndicator">Saved</div>
      </div>

    </main>

    <!-- RIGHT INSPECTOR -->
    <aside class="panel panel-right">

      <h3 class="inspector-heading">Current Page</h3>

      <div class="inspector-row">
        <label>Title</label>
        <div id="inspectorTitle">—</div>
      </div>

      <div class="inspector-row">
        <label>Subtitle</label>
        <div id="inspectorSubtitle">—</div>
      </div>

      <div class="inspector-row">
        <label>Words</label>
        <div id="inspectorWords">0</div>
      </div>

      <div class="inspector-row">
        <label>Chapters</label>
        <div id="inspectorChapters">0</div>
      </div>

      <div class="inspector-row">
        <label>Last saved</label>
        <div id="inspectorSaved">—</div>
      </div>

      <div class="inspector-actions">
        <button id="saveBtn" class="dock-btn">💾 Save</button>
        <button id="previewBtn" class="dock-btn">👁️ Preview</button>
        <button id="publishBtn" class="dock-btn">🚀 Publish</button>
      </div>

    </aside>

  </div>

  <script src="../js/writer.js"></script>
</body>
</html>
