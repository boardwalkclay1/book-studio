<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Boardwalk Book Studio — Library</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <!-- ONLY index.css (self-contained) -->
  <link rel="stylesheet" href="css/index.css" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">

  <!-- Favicon / social preview -->
  <link rel="icon" type="image/jpeg" href="img/publish-logo.jpg" />
  <meta property="og:title" content="Boardwalk Book Studio" />
  <meta property="og:description" content="Create. Write. Publish. Your entire book journey starts here." />
  <meta property="og:image" content="img/publish-logo.jpg" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="img/publish-logo.jpg" />
</head>
<body>

  <!-- Decorative feathers (non-blocking) -->
  <div class="feathers" aria-hidden="true">
    <svg class="feather f1" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M4 60c18-18 40-40 56-56" fill="none" stroke="rgba(212,175,55,0.9)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <svg class="feather f2" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M60 4C42 22 20 44 4 60" fill="none" stroke="rgba(212,175,55,0.85)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <svg class="feather f3" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M8 8c14 14 28 28 48 48" fill="none" stroke="rgba(212,175,55,0.7)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>

  <main id="libraryApp" class="library-app" role="main">

    <!-- HERO -->
    <header class="library-hero" role="banner">
      <h1 class="library-title">Boardwalk Book Studio</h1>
      <p class="library-tagline">Create. Write. Publish. Your entire book journey starts here.</p>

      <div class="hero-actions" style="margin-top: 20px;">
        <a href="pages/publish.html" class="btn-gold publish-btn">Publish With Us</a>
        <a href="pages/books.html" class="btn btn-outline">Our Catalog</a>
      </div>

      <!-- NEW: larger logo placed under the Publish button, aligned to the right.
           This image is in the normal document flow and will scroll with the page. -->
      <div class="hero-logo-container" aria-hidden="true">
        <img src="img/publish-logo.jpg" alt="Boardwalk logo" class="hero-logo" />
      </div>
    </header>

    <!-- HEADER BAR -->
    <div class="library-header">
      <h2 class="library-subtitle">Your Books</h2>
      <div class="header-actions">
        <button id="newBookBtn" class="btn btn-gold new-book-btn">+ Create New Book</button>
      </div>
    </div>

    <!-- BOOK GRID PANEL -->
    <section class="library-panel" aria-labelledby="library-heading">
      <div id="bookGrid" class="book-grid" role="list" aria-live="polite"></div>
    </section>

  </main>

  <!-- NEW BOOK MODAL -->
  <div id="newBookModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-content">
      <h2 id="modalTitle" class="modal-title">Create New Book</h2>

      <label class="field-label">Book Title</label>
      <input id="newBookTitle" class="field-input" placeholder="Enter book title" />

      <label class="field-label">Subtitle</label>
      <input id="newBookSubtitle" class="field-input" placeholder="Optional subtitle" />

      <label class="field-label">Author Name</label>
      <input id="newBookAuthor" class="field-input" placeholder="Your name or pen name" />

      <label class="field-label">Genre</label>
      <input id="newBookGenre" class="field-input" placeholder="Fantasy, Thriller, Romance..." />

      <label class="field-label">Audience</label>
      <input id="newBookAudience" class="field-input" placeholder="Adults, YA, Middle Grade..." />

      <label class="field-label">Short Description</label>
      <textarea id="newBookDescription" class="field-input" placeholder="What is this book about?"></textarea>

      <label class="field-label">Cover Image</label>
      <input type="file" id="newBookCover" accept="image/*" class="field-input" />

      <div class="modal-actions">
        <button id="createBookConfirm" class="btn btn-gold modal-btn">Save</button>
        <button id="closeModal" class="btn modal-btn">Cancel</button>
      </div>
    </div>
  </div>

  <script src="js/index.js" type="module"></script>
</body>
</html>
