<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Boardwalk Book Studio — Publish</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Favicon -->
  <link rel="icon" type="image/jpeg" href="../img/publish-logo.jpg" />

  <!-- Social Preview -->
  <meta property="og:title" content="Boardwalk Book Studio — Publish" />
  <meta property="og:description" content="Prepare your book for print, digital, and KDP with professional publishing tools." />
  <meta property="og:image" content="../img/publish-logo.jpg" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="../img/publish-logo.jpg" />

  <!-- Styles -->
  <link rel="stylesheet" href="../css/publish.css" />
</head>
<body>

<div id="publishApp">

  <!-- LEFT NAVIGATION -->
  <aside id="publishNav" class="panel nav-panel">
    <h2 class="panel-title">Publishing Tools</h2>

    <button class="nav-btn" data-panel="trimPanel">Trim Sizes</button>
    <button class="nav-btn" data-panel="isbnPanel">ISBN & Barcode</button>
    <button class="nav-btn" data-panel="layoutPanel">Layout Modes</button>
    <button class="nav-btn" data-panel="exportPanel">Export Options</button>
    <button class="nav-btn" data-panel="analyticsPanel">Analytics</button>
  </aside>

  <!-- MAIN CONTENT AREA -->
  <main id="publishMain">

    <!-- TRIM SIZE PANEL -->
    <section id="trimPanel" class="panel hidden">
      <h2 class="panel-title">Trim Size Presets</h2>
      <div class="panel-body">
        <select id="trimSelect" class="input">
          <option value="6x9">KDP Paperback — 6 x 9</option>
          <option value="5.5x8.5">Trade — 5.5 x 8.5</option>
          <option value="8.5x11">Letter — 8.5 x 11</option>
          <option value="comic">Comic — 7 x 10</option>
        </select>
        <button id="applyTrim" class="btn-gold">Apply Trim</button>
      </div>
    </section>

    <!-- ISBN PANEL -->
    <section id="isbnPanel" class="panel hidden">
      <h2 class="panel-title">ISBN & Barcode</h2>
      <div class="panel-body">
        <input id="isbnInput" class="input" placeholder="Enter ISBN-13" />
        <button id="generateBarcode" class="btn-gold">Generate Barcode</button>
        <div id="barcodePreview" class="barcode-box"></div>
      </div>
    </section>

    <!-- LAYOUT MODES -->
    <section id="layoutPanel" class="panel hidden">
      <h2 class="panel-title">Layout Modes</h2>
      <div class="panel-body">
        <button class="layout-btn" data-mode="paperback">Paperback Mode</button>
        <button class="layout-btn" data-mode="hardcover">Hardcover Mode</button>
        <button class="layout-btn" data-mode="ebook">E‑Book Mode</button>
        <button class="layout-btn" data-mode="comic">Comic Mode</button>
      </div>
    </section>

    <!-- EXPORT OPTIONS -->
    <section id="exportPanel" class="panel hidden">
      <h2 class="panel-title">Export Options</h2>
      <div class="panel-body">
        <button id="exportPDF" class="btn-gold">Export Print‑Ready PDF</button>
        <button id="exportEPUB" class="btn-gold">Export EPUB 3</button>
        <button id="exportKDP" class="btn-gold">Export KDP Package</button>
      </div>
    </section>

    <!-- ANALYTICS -->
    <section id="analyticsPanel" class="panel hidden">
      <h2 class="panel-title">Book Analytics</h2>
      <div class="panel-body">
        <div id="analyticsWords" class="metric-box"></div>
        <div id="analyticsChapters" class="metric-box"></div>
        <div id="analyticsReadingTime" class="metric-box"></div>
        <canvas id="pacingGraph"></canvas>
      </div>
    </section>

  </main>

</div>

<script type="module" src="../js/publish.js"></script>
</body>
</html>
